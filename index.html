<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Test AI</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

body{
  background:#020617;
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

nav h2{
  color:#38bdf8;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
}

.hero h1{
  font-size:45px;
}

.hero p{
  margin-top:10px;
  opacity:0.7;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#38bdf8,#22c55e);
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

.card{
  margin:20px auto;
  max-width:300px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
}

/* TEST MODAL */
.test{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
}
</style>
</head>

<body>

<nav>
  <h2>IQ AI</h2>
  <button class="btn" onclick="startTest()">Mulai</button>
</nav>

<section class="hero">
  <h1>Unlock Your Brain Potential</h1>
  <p>AI-powered IQ test yang viral 🔥</p>
  <button class="btn" onclick="startTest()">Start Test</button>
</section>

<section class="section">
  <h2>Kenapa pakai ini?</h2>

  <div class="card">⚡ Cepat & interaktif</div>
  <div class="card">🧠 AI simulated analysis</div>
  <div class="card">🔥 Hasil viral & shareable</div>
</section>

<section class="section">
  <h2>Cara kerja</h2>
  <p>Jawab pertanyaan → AI analisis → dapatkan IQ kamu</p>
</section>

<div class="test" id="test">
  <div class="box" id="app"></div>
</div>

<script>
let step=0;
let score=0;

function startTest(){
  document.getElementById("test").style.display="flex";
  next();
}

function next(){
  step++;

  if(step===1){
    app.innerHTML=`
      <h3>2 + 2 = ?</h3>
      <button onclick="ans(4)">4</button>
      <button onclick="ans(5)">5</button>
    `;
  }

  else if(step===2){
    app.innerHTML=`
      <h3>5 x 3 = ?</h3>
      <button onclick="ans(15)">15</button>
      <button onclick="ans(10)">10</button>
    `;
  }

  else{
    let iq=100+(score*10)+Math.floor(Math.random()*10);
    app.innerHTML=`
      <h2>IQ kamu: ${iq}</h2>
      <button onclick="location.reload()">Ulangi</button>
    `;
  }
}

function ans(v){
  if((step===1 && v===4)||(step===2 && v===15)){
    score++;
  }
  next();
}
</script>

</body>
</html>
